openapi: 3.0.3
info:
  title: NeoEduCore API
  version: 1.0.0
  description: API documentation - endpoints defined in routes/api.php
servers:
  - url: http://localhost
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        full_name:
          type: string
      example:
        id: "u_12345"
        email: "alumno@example.com"
        full_name: "Maria Perez"

    Student:
      type: object
      properties:
        user_id:
          type: string
        student_code:
          type: string
        grade:
          type: integer
        section:
          type: string
        status:
          type: string
        adecuacion_type:
          type: string
          enum: [acceso, contenido, evaluacion]
      example:
        user_id: "u_12345"
        student_code: "S-2026-001"
        grade: 10
        section: "A"
        status: "active"
        adecuacion_type: "acceso"

    Group:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      example:
        id: "g_10"
        name: "Grupo A"

    Subject:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      example:
        id: "s_5"
        name: "Matematicas"

    Exam:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        grade:
          type: integer
      example:
        id: "e_77"
        title: "Examen Unidad 1"
        grade: 10

    ExamAttempt:
      type: object
      properties:
        id:
          type: string
        student_user_id:
          type: string
        score:
          type: number
      example:
        id: "ea_333"
        student_user_id: "u_12345"
        score: 8.5

    StudyResource:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
      example:
        id: "r_21"
        title: "Resumen de Capitulo 1"

    CalendarEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
      example:
        id: "c_9"
        title: "Clase magistral"

    Institution:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
      example:
        id: "i_1"
        code: "INST-001"
        name: "Instituto Central"

tags:
  - name: health
  - name: auth
  - name: students
  - name: groups
  - name: subjects
  - name: exams
  - name: exam-attempts
  - name: student-answers
  - name: student-progress
  - name: study-resources
  - name: calendar-events
  - name: ai
  - name: users
  - name: institutions
  - name: reports

paths:

  # ─── Health ───────────────────────────────────────────────────────────────

  /ping:
    get:
      operationId: get_ping
      tags: [health]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                status: "ok"

  # ─── Auth ─────────────────────────────────────────────────────────────────

  /register:
    post:
      operationId: post_register
      tags: [auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: "nuevo@example.com"
              password: "secret123"
              full_name: "Nuevo Usuario"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /auth/login:
    post:
      operationId: post_auth_login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: "alumno@example.com"
              password: "contrasena123"
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              example:
                token: "eyJhbGciOi..."
                user:
                  id: "u_12345"
                  email: "alumno@example.com"
                  full_name: "Maria Perez"

  /auth/me:
    get:
      operationId: get_auth_me
      tags: [auth]
      summary: Current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /auth/logout:
    post:
      operationId: post_auth_logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              example:
                message: "Logged out"

  /password/forgot:
    post:
      operationId: post_password_forgot
      tags: [auth]
      summary: Request password reset link
      requestBody:
        content:
          application/json:
            example:
              email: "alumno@example.com"
      responses:
        '200':
          description: Email sent
          content:
            application/json:
              example:
                message: "Reset link sent"

  /password/verify:
    post:
      operationId: post_password_verify
      tags: [auth]
      summary: Verify reset token
      requestBody:
        content:
          application/json:
            example:
              token: "reset-token-abc"
      responses:
        '200':
          description: Token valid
          content:
            application/json:
              example:
                valid: true

  /password/reset:
    post:
      operationId: post_password_reset
      tags: [auth]
      summary: Reset password
      requestBody:
        content:
          application/json:
            example:
              token: "reset-token-abc"
              password: "newpass123"
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              example:
                message: "Password updated"

  /password/change:
    post:
      operationId: post_password_change
      tags: [auth]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            example:
              old_password: "oldpass"
              new_password: "newpass123"
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              example:
                message: "Password changed"

  # ─── Students ─────────────────────────────────────────────────────────────

  /students:
    get:
      operationId: get_students
      tags: [students]
      summary: List students
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: grade
          schema:
            type: integer
        - in: query
          name: section
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: Paginated students
          content:
            application/json:
              example:
                data:
                  - user_id: "u_12345"
                    student_code: "S-2026-001"
                    grade: 10
                    section: "A"
                    status: "active"
                    adecuacion_type: "acceso"
                meta:
                  page: 1
                  per_page: 15
                  total: 1

  /students/me:
    get:
      operationId: get_students_me
      tags: [students]
      summary: Current student profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Student profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'

  /students/{student_user_id}:
    get:
      operationId: get_students_by_id
      tags: [students]
      summary: Get student by user_id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: student_user_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
    put:
      operationId: put_students_by_id
      tags: [students]
      summary: Update student
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: student_user_id
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Student'
      responses:
        '200':
          description: Updated student
    patch:
      operationId: patch_students_by_id
      tags: [students]
      summary: Set student status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: student_user_id
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            example:
              status: "inactive"
      responses:
        '200':
          description: Status updated

  # ─── Groups ───────────────────────────────────────────────────────────────

  /groups:
    get:
      operationId: get_groups
      tags: [groups]
      summary: List groups
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
    post:
      operationId: post_groups
      tags: [groups]
      summary: Create group
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            example:
              name: "Grupo Nuevo"
      responses:
        '201':
          description: Created

  /groups/{id}:
    get:
      operationId: get_groups_by_id
      tags: [groups]
      summary: Get group
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
    put:
      operationId: put_groups_by_id
      tags: [groups]
      summary: Update group
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Group'
      responses:
        '200':
          description: Updated
    delete:
      operationId: delete_groups_by_id
      tags: [groups]
      summary: Delete group
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              example:
                message: "Group deleted"

  # ─── Subjects ─────────────────────────────────────────────────────────────

  /subjects:
    get:
      operationId: get_subjects
      tags: [subjects]
      summary: List subjects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subject'
    post:
      operationId: post_subjects
      tags: [subjects]
      summary: Create subject
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            example:
              name: "Fisica"
      responses:
        '201':
          description: Created

  /subjects/{id}:
    get:
      operationId: get_subjects_by_id
      tags: [subjects]
      summary: Get subject
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
    put:
      operationId: put_subjects_by_id
      tags: [subjects]
      summary: Update subject
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Subject'
      responses:
        '200':
          description: Updated
    delete:
      operationId: delete_subjects_by_id
      tags: [subjects]
      summary: Delete subject
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              example:
                message: "Subject deleted"

  # ─── Exams ────────────────────────────────────────────────────────────────

  /exams:
    get:
      operationId: get_exams
      tags: [exams]
      summary: List exams
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Exam'
    post:
      operationId: post_exams
      tags: [exams]
      summary: Create exam
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Exam'
      responses:
        '201':
          description: Created

  /exams/{exam}:
    get:
      operationId: get_exams_by_id
      tags: [exams]
      summary: Get exam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: exam
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Exam
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exam'
    put:
      operationId: put_exams_by_id
      tags: [exams]
      summary: Update exam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: exam
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Exam'
      responses:
        '200':
          description: Updated
    delete:
      operationId: delete_exams_by_id
      tags: [exams]
      summary: Delete exam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: exam
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              example:
                message: "Exam deleted"

  /exams/{exam}/questions:
    get:
      operationId: get_exam_questions
      tags: [exams]
      summary: List questions for exam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: exam
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Questions list
          content:
            application/json:
              example:
                - id: "q_1"
                  text: "Cual es 2+2?"
                  question_type: "multiple_choice"
                - id: "q_2"
                  text: "Explica el teorema de Pitagoras."
                  question_type: "open"
    post:
      operationId: post_exam_questions
      tags: [exams]
      summary: Add question to exam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: exam
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                question_type:
                  type: string
      responses:
        '201':
          description: Created

  /questions/{question}:
    put:
      operationId: put_question
      tags: [exams]
      summary: Update question
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: question
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                question_type:
                  type: string
      responses:
        '200':
          description: Updated
    delete:
      operationId: delete_question
      tags: [exams]
      summary: Delete question
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: question
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  # ─── Exam Attempts ────────────────────────────────────────────────────────

  /exams/{exam}/attempts/start:
    post:
      operationId: post_exam_attempt_start
      tags: [exam-attempts]
      summary: Start attempt
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: exam
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Attempt started

  /exams/{exam}/attempts/{attempt}:
    get:
      operationId: get_exam_attempt
      tags: [exam-attempts]
      summary: Get attempt
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: exam
          required: true
          schema:
            type: string
        - in: path
          name: attempt
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Attempt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamAttempt'

  /exams/{exam}/attempts/{attempt}/submit:
    post:
      operationId: post_exam_attempt_submit
      tags: [exam-attempts]
      summary: Submit attempt
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: exam
          required: true
          schema:
            type: string
        - in: path
          name: attempt
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Attempt submitted

  # ─── Student Answers ──────────────────────────────────────────────────────

  /exam-attempts/{attempt}/answers:
    get:
      operationId: get_attempt_answers
      tags: [student-answers]
      summary: List answers for attempt
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: attempt
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Answers list
          content:
            application/json:
              example:
                - id: "sa_1"
                  question_id: "q_1"
                  answer: "4"
                - id: "sa_2"
                  question_id: "q_2"
                  answer: "Explicacion breve"

  /student-answers/{studentAnswer}/review:
    patch:
      operationId: patch_student_answer_review
      tags: [student-answers]
      summary: Review student answer
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: studentAnswer
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            example:
              score: 9
              feedback: "Bien explicado"
      responses:
        '200':
          description: Review saved
          content:
            application/json:
              example:
                message: "Review saved"

  # ─── Student Progress ─────────────────────────────────────────────────────

  /student-progress:
    get:
      operationId: get_student_progress
      tags: [student-progress]
      summary: List student progress
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Progress list
    post:
      operationId: post_student_progress
      tags: [student-progress]
      summary: Upsert progress
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Upserted

  /student-progress/me:
    get:
      operationId: get_student_progress_me
      tags: [student-progress]
      summary: My progress
      security:
        - bearerAuth: []
      responses:
        '200':
          description: My progress

  /student-progress/recalc:
    post:
      operationId: post_student_progress_recalc
      tags: [student-progress]
      summary: Recalculate progress from attempts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Recalculated

  # ─── Study Resources ──────────────────────────────────────────────────────

  /study-resources:
    get:
      operationId: get_study_resources
      tags: [study-resources]
      summary: List study resources
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudyResource'
    post:
      operationId: post_study_resources
      tags: [study-resources]
      summary: Create study resource
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudyResource'
      responses:
        '201':
          description: Created

  /study-resources/{id}:
    get:
      operationId: get_study_resources_by_id
      tags: [study-resources]
      summary: Get study resource
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyResource'
    put:
      operationId: put_study_resources_by_id
      tags: [study-resources]
      summary: Update study resource
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudyResource'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyResource'
    delete:
      operationId: delete_study_resources_by_id
      tags: [study-resources]
      summary: Delete study resource
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              example:
                message: "Resource deleted"

  # ─── Calendar Events ──────────────────────────────────────────────────────

  /calendar-events:
    get:
      operationId: get_calendar_events
      tags: [calendar-events]
      summary: List calendar events
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CalendarEvent'
    post:
      operationId: post_calendar_events
      tags: [calendar-events]
      summary: Create calendar event
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEvent'
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'

  /calendar-events/{id}:
    get:
      operationId: get_calendar_events_by_id
      tags: [calendar-events]
      summary: Get calendar event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'
    put:
      operationId: put_calendar_events_by_id
      tags: [calendar-events]
      summary: Update calendar event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEvent'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'
    delete:
      operationId: delete_calendar_events_by_id
      tags: [calendar-events]
      summary: Delete calendar event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
